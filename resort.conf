<VirtualHost *:80>
    ServerName yourdomain.com
    ServerAlias www.yourdomain.com

    # Redirect all HTTP to HTTPS (uncomment after SSL is set up)
    # RewriteEngine On
    # RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]

    DocumentRoot /var/www/resort-reservation-system

    <Directory /var/www/resort-reservation-system>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Block access to sensitive directories at the server level
    <Directory /var/www/resort-reservation-system/config>
        Require all denied
    </Directory>
    <Directory /var/www/resort-reservation-system/helpers>
        Require all denied
    </Directory>
    <Directory /var/www/resort-reservation-system/scripts>
        Require all denied
    </Directory>
    <Directory /var/www/resort-reservation-system/logs>
        Require all denied
    </Directory>
    <Directory /var/www/resort-reservation-system/tmp>
        Require all denied
    </Directory>
    <Directory /var/www/resort-reservation-system/database>
        Require all denied
    </Directory>
    <Directory /var/www/resort-reservation-system/output>
        Require all denied
    </Directory>
    <Directory /var/www/resort-reservation-system/vendor>
        Require all denied
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/resort-error.log
    CustomLog ${APACHE_LOG_DIR}/resort-access.log combined
</VirtualHost>

